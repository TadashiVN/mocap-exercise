<svg width="1100" height="260" viewBox="0 0 1100 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
    <style>
      .box{fill:#f7f7f7;stroke:#333;stroke-width:2;rx:12;ry:12}
      .title{font-family:Arial, sans-serif;font-size:20px;font-weight:bold;fill:#111}
      .sub{font-family:Arial, sans-serif;font-size:14px;fill:#444}
      .arrow{stroke:#333;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="550" y="35" text-anchor="middle" class="title">Wearable IMU-Based Squat Posture Evaluation</text>

  <rect x="25" y="85" width="150" height="80" class="box"/>
  <text x="100" y="115" text-anchor="middle" class="title">MPU6050</text>
  <text x="100" y="140" text-anchor="middle" class="sub">Accelerometer</text>
  <text x="100" y="158" text-anchor="middle" class="sub">Gyroscope</text>

  <line x1="175" y1="125" x2="230" y2="125" class="arrow"/>

  <rect x="235" y="85" width="150" height="80" class="box"/>
  <text x="310" y="115" text-anchor="middle" class="title">ESP32 Nodes</text>
  <text x="310" y="142" text-anchor="middle" class="sub">Read sensor data</text>

  <line x1="385" y1="125" x2="440" y2="125" class="arrow"/>

  <rect x="445" y="85" width="150" height="80" class="box"/>
  <text x="520" y="115" text-anchor="middle" class="title">Serial / USB</text>
  <text x="520" y="142" text-anchor="middle" class="sub">CSV data stream</text>

  <line x1="595" y1="125" x2="650" y2="125" class="arrow"/>

  <rect x="655" y="85" width="150" height="80" class="box"/>
  <text x="730" y="115" text-anchor="middle" class="title">Python</text>
  <text x="730" y="142" text-anchor="middle" class="sub">Sliding window</text>
  <text x="730" y="160" text-anchor="middle" class="sub">Model inference</text>

  <line x1="805" y1="125" x2="860" y2="125" class="arrow"/>

  <rect x="865" y="85" width="190" height="80" class="box"/>
  <text x="960" y="115" text-anchor="middle" class="title">Flask Web UI</text>
  <text x="960" y="142" text-anchor="middle" class="sub">Posture result</text>
  <text x="960" y="160" text-anchor="middle" class="sub">Confidence score</text>
</svg>
